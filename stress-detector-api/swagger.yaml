openapi: 3.0.0
info:
  title: CekTenang API (Stress Detector)
  description: |
    REST API for the CekTenang Student Stress Detector application.
    
    **Flow:**
    1. Register → Login → get `accessToken`
    2. `POST /activities` (or `PUT /activities/{id}`) → triggers ML prediction automatically. If 7 days of activities in the current ISO week are completed, automatically generates the weekly summary, insights, and recommendations.
    3. `GET /predictions/latest` → view today's stress level
    4. `GET /dashboard` → aggregated view for the frontend dashboard
    
    **Auth:** All protected endpoints require `Authorization: Bearer <accessToken>`
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Activity:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        activity_date: { type: string, format: date }
        activity_status:
          type: string
          enum: [draft, submitted]
        sleep_hours: { type: number }
        study_hours: { type: number }
        screen_time_hours: { type: number }
        social_media_hours: { type: number }
        physical_activity_minutes: { type: integer }
        mood_score: { type: integer }
        fatigue_level: { type: integer }
        assignment_load: { type: integer }
        deadline_pressure: { type: integer }
        note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Prediction:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        activity_id: { type: string }
        prediction_date: { type: string, format: date }
        stress_level:
          type: string
          enum: [low, moderate, high]
        stress_score: { type: number }
        confidence_score: { type: number }
        model_version: { type: string }
        created_at: { type: string, format: date-time }

    WeeklySummary:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        week_start: { type: string, format: date }
        week_end: { type: string, format: date }
        average_stress_level: { type: number }
        average_sleep_hours: { type: number }
        average_screen_time_hours: { type: number }
        average_study_hours: { type: number }
        stress_trend:
          type: string
          enum: [improving, worsening, stable]
        created_at: { type: string, format: date-time }

    Insight:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        weekly_summary_id: { type: string }
        period_type:
          type: string
          enum: [daily, weekly]
        insight_text: { type: string }
        created_at: { type: string, format: date-time }

    Recommendation:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        weekly_summary_id: { type: string }
        period_type:
          type: string
          enum: [daily, weekly]
        category: { type: string }
        priority_level: { type: string }
        title: { type: string }
        recommendation_text: { type: string }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }

    Pagination:
      type: object
      properties:
        limit: { type: integer }
        offset: { type: integer }

    SuccessResponse:
      type: object
      properties:
        status: { type: string, example: success }
        message: { type: string }
        data: { type: object }

    ErrorResponse:
      type: object
      properties:
        status: { type: string, example: fail }
        message: { type: string }

security:
  - bearerAuth: []

tags:
  - name: Users
    description: Registration and user lookup
  - name: Authentications
    description: Login, token refresh, and logout
  - name: Profiles
    description: User profile management
  - name: Activities
    description: Daily activity submission and history
  - name: Predictions
    description: AI stress prediction results
  - name: Weekly Summaries
    description: Weekly aggregation and AI insight generation
  - name: Insights
    description: AI-generated weekly insights
  - name: Recommendations
    description: AI-generated personalized recommendations
  - name: Dashboard
    description: Aggregated data for the dashboard view
  - name: Exports
    description: Queueing daily stress prediction and weekly summary emails

paths:
  # ─── USERS ────────────────────────────────────────────────────────────────
  /users:
    post:
      summary: Register a new student account
      tags: [Users]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullname, email, password]
              properties:
                fullname:
                  type: string
                  example: Muhammad Rendy
                email:
                  type: string
                  example: rendy@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Search users by email
      tags: [Users]
      security: []
      parameters:
        - in: query
          name: email
          schema: { type: string }
      responses:
        '200':
          description: Users retrieved

  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User retrieved
        '404':
          description: User not found

  # ─── AUTHENTICATIONS ──────────────────────────────────────────────────────
  /authentications:
    post:
      summary: Login
      tags: [Authentications]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: rendy@example.com
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful — returns access and refresh tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken: { type: string }
                          refreshToken: { type: string }
        '401':
          description: Invalid credentials

    put:
      summary: Refresh access token
      tags: [Authentications]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New access and refresh tokens returned
        '401':
          description: Invalid refresh token

    delete:
      summary: Logout (invalidate refresh token)
      tags: [Authentications]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Logged out successfully

  /authentications/forgot-password:
    post:
      summary: Request password reset link (Forgot Password)
      tags: [Authentications]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '200':
          description: Recovery link sent to email successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Validation error
        '404':
          description: Email not registered

  /authentications/reset-password:
    post:
      summary: Reset password using recovery token
      tags: [Authentications]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  example: Odq95tAc_UR0TyKIoqakTqZ7eGjIuCCW
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: newpassword123
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Invalid token or expired, or validation error

  /authentications/google:
    post:
      summary: Login with Google (OAuth 2.0)
      description: |
        Authenticates a user using a Google ID Token obtained from Google Sign-In (GSI).
        - If the Google account is already linked, the user is logged in.
        - If the email matches an existing account, the Google ID is linked to it.
        - Otherwise, a new user account is created automatically.
      tags: [Authentications]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
                  description: Google ID Token (JWT) from Google Sign-In callback
                  example: eyJhbGciOiJSUzI1NiIsImtpZCI6IjEifQ...
      responses:
        '200':
          description: Login with Google successful — returns access and refresh tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          accessToken: { type: string }
                          refreshToken: { type: string }
        '400':
          description: Validation error — credential field missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'



  # ─── PROFILES ─────────────────────────────────────────────────────────────
  /profiles/me:
    get:
      summary: Get current user profile
      tags: [Profiles]
      responses:
        '200':
          description: Profile retrieved

  /profiles/info:
    put:
      summary: Update profile info (fullname)
      tags: [Profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullname, email]
              properties:
                fullname: { type: string, example: Muhammad Rendy }
                email: { type: string, format: email, example: rendy@example.com }
      responses:
        '200':
          description: Profile updated

  /profiles/password:
    put:
      summary: Update password
      tags: [Profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string, format: password }
                newPassword: { type: string, format: password, minLength: 6 }
      responses:
        '200':
          description: Password updated

  /profiles/picture:
    put:
      summary: Upload profile picture
      tags: [Profiles]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile picture uploaded

  # ─── ACTIVITIES ───────────────────────────────────────────────────────────
  /activities:
    post:
      summary: Submit daily activity (auto-triggers ML prediction and weekly summary generation if 7 days are complete)
      tags: [Activities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activityDate
                - sleepHours
                - studyHours
                - screenTimeHours
                - socialMediaHours
                - physicalActivityMinutes
                - moodScore
                - fatigueLevel
                - assignmentLoad
                - deadlinePressure
              properties:
                activityDate: { type: string, format: date, example: '2026-05-18' }
                sleepHours: { type: number, minimum: 0, maximum: 24, example: 7 }
                studyHours: { type: number, minimum: 0, maximum: 24, example: 6 }
                screenTimeHours: { type: number, minimum: 0, maximum: 24, example: 4 }
                socialMediaHours: { type: number, minimum: 0, maximum: 24, example: 2 }
                physicalActivityMinutes: { type: integer, minimum: 0, example: 30 }
                moodScore: { type: integer, minimum: 1, maximum: 10, example: 6 }
                fatigueLevel: { type: integer, minimum: 1, maximum: 10, example: 5 }
                assignmentLoad: { type: integer, minimum: 0, example: 3 }
                deadlinePressure: { type: integer, minimum: 1, maximum: 10, example: 7 }
                activityStatus:
                  type: string
                  enum: [draft, submitted]
                  default: submitted
                  example: submitted
                note:
                  type: string
                  maxLength: 500
                  example: Feel a bit stressed today.
      responses:
        '201':
          description: Activity saved. `prediction` is null if ML service is unavailable.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          activity:
                            $ref: '#/components/schemas/Activity'
                          prediction:
                            $ref: '#/components/schemas/Prediction'
                          mlAvailable: { type: boolean }

    get:
      summary: List own activities (paginated)
      tags: [Activities]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Activities retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          activities:
                            type: array
                            items:
                              $ref: '#/components/schemas/Activity'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /activities/{id}:
    get:
      summary: Get a specific activity
      tags: [Activities]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Activity retrieved
        '403':
          description: Not the owner
        '404':
          description: Activity not found

    put:
      summary: Update a daily activity (triggers ML re-prediction and weekly summary generation if 7 days are complete)
      tags: [Activities]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activityDate
                - sleepHours
                - studyHours
                - screenTimeHours
                - socialMediaHours
                - physicalActivityMinutes
                - moodScore
                - fatigueLevel
                - assignmentLoad
                - deadlinePressure
              properties:
                activityDate: { type: string, format: date, example: '2026-05-18' }
                sleepHours: { type: number, minimum: 0, maximum: 24, example: 7 }
                studyHours: { type: number, minimum: 0, maximum: 24, example: 6 }
                screenTimeHours: { type: number, minimum: 0, maximum: 24, example: 4 }
                socialMediaHours: { type: number, minimum: 0, maximum: 24, example: 2 }
                physicalActivityMinutes: { type: integer, minimum: 0, example: 30 }
                moodScore: { type: integer, minimum: 1, maximum: 10, example: 6 }
                fatigueLevel: { type: integer, minimum: 1, maximum: 10, example: 5 }
                assignmentLoad: { type: integer, minimum: 0, example: 3 }
                deadlinePressure: { type: integer, minimum: 1, maximum: 10, example: 7 }
                activityStatus:
                  type: string
                  enum: [draft, submitted]
                  default: submitted
                  example: submitted
                note:
                  type: string
                  maxLength: 500
                  example: Feel a bit stressed today.
      responses:
        '200':
          description: Activity updated. `prediction` is updated (or saved if it didn't exist).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          activity:
                            $ref: '#/components/schemas/Activity'
                          prediction:
                            $ref: '#/components/schemas/Prediction'
                          mlAvailable: { type: boolean }
        '403':
          description: Not the owner
        '404':
          description: Activity not found

    delete:
      summary: Delete an activity
      tags: [Activities]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Activity deleted
        '403':
          description: Not the owner
        '404':
          description: Activity not found

  # ─── PREDICTIONS ──────────────────────────────────────────────────────────
  /predictions:
    get:
      summary: List stress prediction history (paginated)
      tags: [Predictions]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Predictions retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          predictions:
                            type: array
                            items:
                              $ref: '#/components/schemas/Prediction'
                          pagination:
                            $ref: '#/components/schemas/Pagination'

  /predictions/latest:
    get:
      summary: Get the most recent prediction
      tags: [Predictions]
      responses:
        '200':
          description: Latest prediction retrieved (null if none exists)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          prediction:
                            $ref: '#/components/schemas/Prediction'

  # ─── WEEKLY SUMMARIES ─────────────────────────────────────────────────────
  /weekly-summaries:
    get:
      summary: List weekly summaries (paginated)
      tags: [Weekly Summaries]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Weekly summaries retrieved

  /weekly-summaries/latest:
    get:
      summary: Get the most recent weekly summary
      tags: [Weekly Summaries]
      responses:
        '200':
          description: Latest weekly summary retrieved

  # ─── INSIGHTS ─────────────────────────────────────────────────────────────
  /insights:
    get:
      summary: List AI-generated insights (paginated)
      tags: [Insights]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Insights retrieved

  /insights/latest:
    get:
      summary: Get the most recent insight
      tags: [Insights]
      responses:
        '200':
          description: Latest insight retrieved

  # ─── RECOMMENDATIONS ──────────────────────────────────────────────────────
  /recommendations:
    get:
      summary: List recommendations (paginated)
      tags: [Recommendations]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Recommendations retrieved

  /recommendations/latest:
    get:
      summary: Get the most recent recommendation
      tags: [Recommendations]
      responses:
        '200':
          description: Latest recommendation retrieved

  /recommendations/{id}/read:
    patch:
      summary: Mark a recommendation as read
      tags: [Recommendations]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Recommendation marked as read
        '404':
          description: Recommendation not found

  # ─── DASHBOARD ────────────────────────────────────────────────────────────
  /dashboard:
    get:
      summary: >
        Get aggregated dashboard data in one request:
        latest prediction, weekly summary, insight, recommendation, and unread count.
      tags: [Dashboard]
      responses:
        '200':
          description: Dashboard data retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          latestPrediction:
                            $ref: '#/components/schemas/Prediction'
                          latestWeeklySummary:
                            $ref: '#/components/schemas/WeeklySummary'
                          latestInsight:
                            $ref: '#/components/schemas/Insight'
                          latestRecommendation:
                            $ref: '#/components/schemas/Recommendation'
                          unreadRecommendations:
                            type: integer
                            example: 3

  /dashboard/trend:
    get:
      summary: Get stress score time-series for chart visualization
      tags: [Dashboard]
      parameters:
        - in: query
          name: days
          description: Number of past days to include (default 30)
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Stress trend data retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          trend:
                            type: array
                            items:
                              type: object
                              properties:
                                prediction_date: { type: string, format: date }
                                stress_score: { type: number }
                                stress_level:
                                  type: string
                                  enum: [low, moderate, high]
                          days: { type: integer }

  # ─── EXPORTS ──────────────────────────────────────────────────────────────
  /exports/daily-prediction:
    post:
      summary: Send daily stress prediction analysis to email via RabbitMQ
      tags: [Exports]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                targetEmail:
                  type: string
                  format: email
                  example: student@example.com
                  description: Optional target email. Defaults to user's registered email.
      responses:
        '201':
          description: Export task successfully queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /exports/weekly-summary:
    post:
      summary: Send weekly mental health summary and AI recommendations to email via RabbitMQ
      tags: [Exports]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                targetEmail:
                  type: string
                  format: email
                  example: student@example.com
                  description: Optional target email. Defaults to user's registered email.
      responses:
        '201':
          description: Export task successfully queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not found
